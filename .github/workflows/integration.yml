name: Integration Test

on:
  push:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
      - "**.md"
      - ".release-please-manifest.json"
  pull_request:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
      - "**.md"
      - ".release-please-manifest.json"
  workflow_dispatch:

# Prevent concurrent applies against the same state.
# cancel-in-progress: false so an in-flight apply never gets abandoned mid-run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_WORKING_DIR: examples/full
  # Temp Azure CLI profile — avoids touching ~/.azure on the runner
  AZURE_CONFIG_DIR: /tmp/azure-ci-${{ github.run_id }}

jobs:
  # ── Build the custom azapi provider binary ────────────────────────────────
  # Keyed to the provider branch's HEAD commit so cache is invalidated
  # automatically when the branch is updated.
  build-provider:
    name: Build custom azapi provider
    runs-on: ubuntu-latest
    outputs:
      provider_sha: ${{ steps.sha.outputs.sha }}
      cache_key: ${{ steps.sha.outputs.cache_key }}
    steps:
      - name: Resolve provider branch HEAD
        id: sha
        run: |
          SHA=$(git ls-remote https://github.com/kewalaka/terraform-provider-azapi \
            refs/heads/kewalaka/add-table-storage-dataplane | cut -f1)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "cache_key=azapi-provider-${{ runner.os }}-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Restore cached provider binary
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.local/terraform-plugins/terraform-provider-azapi
          key: ${{ steps.sha.outputs.cache_key }}

      - name: Clone provider source
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch kewalaka/add-table-storage-dataplane \
            https://github.com/kewalaka/terraform-provider-azapi.git /tmp/provider-src

      - uses: actions/setup-go@v6
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          go-version: "1.26"
          cache-dependency-path: /tmp/provider-src/go.sum

      - name: Build provider
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/terraform-plugins
          cd /tmp/provider-src
          go build -o ~/.local/terraform-plugins/terraform-provider-azapi .

      - name: Save provider binary to cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.local/terraform-plugins/terraform-provider-azapi
          key: ${{ steps.sha.outputs.cache_key }}

  # ── terraform plan ────────────────────────────────────────────────────────
  # Runs on every push and PR. Uploads tfplan as an artifact to the apply job
  plan:
    name: Terraform Plan
    needs: build-provider
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC token exchange
      contents: read
    env:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
    outputs:
      artifact_name: tf-run-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore provider binary
        uses: actions/cache/restore@v5
        with:
          path: ~/.local/terraform-plugins/terraform-provider-azapi
          key: ${{ needs.build-provider.outputs.cache_key }}
          fail-on-cache-miss: true

      - name: Configure Terraform dev_overrides
        run: |
          PLUGIN_DIR="$HOME/.local/terraform-plugins"
          cat > ~/.terraformrc <<TFRC
          provider_installation {
            dev_overrides {
              "Azure/azapi" = "$PLUGIN_DIR"
            }
            direct {}
          }
          TFRC

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.14"

      - name: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -upgrade

      - name: terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan -input=false -detailed-exitcode
        # exit 0 = no changes, exit 1 = error, exit 2 = changes pending
        # The step succeeds on exit 0 or 2 (changes are expected).
        continue-on-error: true
        id: plan

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure' && steps.plan.outputs.exitcode == '1'
        run: exit 1

      # Bundle plan + the state as it was at plan time.
      # Guarantees the apply job uses the same (plan, state) pair — no race condition.
      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: tf-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/terraform.tfstate
          if-no-files-found: warn
          retention-days: 2

  # ── terraform apply ───────────────────────────────────────────────────────
  # Only runs on pushes to main (and workflow_dispatch).
  # Gated by the 'integration' GitHub Environment — a reviewer must approve
  # before this job starts.
  apply:
    name: Terraform Apply
    needs: [build-provider, plan]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: integration
    permissions:
      id-token: write
      contents: read
    env:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Restore provider binary
        uses: actions/cache/restore@v5
        with:
          path: ~/.local/terraform-plugins/terraform-provider-azapi
          key: ${{ needs.build-provider.outputs.cache_key }}
          fail-on-cache-miss: true

      - name: Configure Terraform dev_overrides
        run: |
          PLUGIN_DIR="$HOME/.local/terraform-plugins"
          cat > ~/.terraformrc <<TFRC
          provider_installation {
            dev_overrides {
              "Azure/azapi" = "$PLUGIN_DIR"
            }
            direct {}
          }
          TFRC

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.14"

      # Download the exact { tfplan, terraform.tfstate } pair from the plan job.
      # This guarantees apply uses the state that plan was generated against.
      - name: Download plan artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.plan.outputs.artifact_name }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -upgrade

      - name: terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: terraform destroy
        if: always() && steps.init.outcome == 'success'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -auto-approve
