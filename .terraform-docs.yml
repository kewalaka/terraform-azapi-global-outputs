formatter: markdown table

output:
  file: README.md
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

sort:
  enabled: true
  by: required

settings:
  # Render anchor links so cross-references in GitHub work
  anchor: true
  # Keep description formatting from variable/output descriptions
  description: true
